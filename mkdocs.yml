site_name: plissken
site_description: Documentation generator for Rust-Python hybrid projects
site_url: https://colliery-io.github.io/plissken
repo_url: https://github.com/colliery-io/plissken
repo_name: colliery-io/plissken

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/colliery-io/plissken

nav:
  - Home: index.md
  - Tutorials:
    - Quickstart: tutorials/quickstart.md
    - Document a Python Project: tutorials/python-project.md
    - Document a Rust Project: tutorials/rust-project.md
    - Document a Hybrid Project: tutorials/hybrid-project.md
  - How-To Guides:
    - Install plissken: how-to/install.md
    - Install (Detailed): how-to/install-plissken.md
    - Configure plissken: how-to/configure-plissken.md
    - Initialize a Project: how-to/initialize-project.md
    - Configure for Different Project Types: how-to/configure-project-types.md
    - Document Python Projects: how-to/document-python-projects.md
    - Document Rust Projects: how-to/document-rust-projects.md
    - Document Hybrid Projects: how-to/document-hybrid-projects.md
    - Document a Monorepo: how-to/document-monorepo.md
    - Integrate with an Existing Doc Site: how-to/integrate-with-existing-docs.md
    - Use mdBook Instead of MkDocs: how-to/use-mdbook.md
    - Customize Templates: how-to/customize-templates.md
    - Customize Output: how-to/customize-output.md
    - Validate Configuration: how-to/validate-configuration.md
    - Generate the JSON Doc Model: how-to/generate-json-model.md
    - Integrate with CI/CD: how-to/ci-integration.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Configuration Reference: reference/configuration.md
    - Data Model Reference: reference/data-model.md
    - Template Variables Reference: reference/template-variables.md
    - Theme Adapter Reference: reference/theme-adapters.md
  - Explanation:
